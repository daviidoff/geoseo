<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Apple Touch Icon - high quality for iOS home screen -->
  <rect width="180" height="180" rx="40" fill="url(#appleBg)"/>

  <!-- Target rings (niche concept) -->
  <circle cx="90" cy="90" r="65" stroke="white" stroke-width="4" opacity="0.3"/>
  <circle cx="90" cy="90" r="47" stroke="white" stroke-width="4" opacity="0.5"/>

  <!-- "HN" lettermark -->
  <g opacity="0.95">
    <!-- H -->
    <rect x="57" y="57" width="8" height="66" rx="4" fill="white"/>
    <rect x="57" y="86" width="28" height="8" rx="4" fill="white"/>
    <rect x="77" y="57" width="8" height="66" rx="4" fill="white"/>

    <!-- N -->
    <rect x="95" y="57" width="8" height="66" rx="4" fill="white"/>
    <path d="M95 57 L123 123" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <rect x="115" y="57" width="8" height="66" rx="4" fill="white"/>
  </g>

  <!-- AI neural nodes -->
  <circle cx="35" cy="35" r="6" fill="white" opacity="0.7"/>
  <circle cx="145" cy="35" r="6" fill="white" opacity="0.7"/>
  <circle cx="35" cy="145" r="6" fill="white" opacity="0.7"/>
  <circle cx="145" cy="145" r="6" fill="white" opacity="0.7"/>

  <defs>
    <linearGradient id="appleBg" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
