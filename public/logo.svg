<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- HyperNiche AI - Modern, sophisticated logo -->
  <!-- Rounded square container -->
  <rect width="40" height="40" rx="8" fill="url(#bgGradient)"/>

  <!-- "H" and "N" lettermark integrated with target/niche concept -->
  <!-- Outer target ring (niche concept) -->
  <circle cx="20" cy="20" r="14" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <circle cx="20" cy="20" r="10" stroke="white" stroke-width="1.5" opacity="0.5"/>

  <!-- Central "HN" monogram with neural network nodes -->
  <g opacity="0.95">
    <!-- H vertical left -->
    <rect x="13" y="13" width="2" height="14" rx="1" fill="white"/>
    <!-- H horizontal bar -->
    <rect x="13" y="19" width="6" height="2" rx="1" fill="white"/>
    <!-- H vertical right (connects to N) -->
    <rect x="17" y="13" width="2" height="14" rx="1" fill="white"/>

    <!-- N vertical left (shared with H) -->
    <rect x="21" y="13" width="2" height="14" rx="1" fill="white"/>
    <!-- N diagonal -->
    <path d="M21 13 L27 27" stroke="white" stroke-width="2" stroke-linecap="round"/>
    <!-- N vertical right -->
    <rect x="25" y="13" width="2" height="14" rx="1" fill="white"/>
  </g>

  <!-- AI neural nodes (small dots representing AI/connections) -->
  <circle cx="10" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="30" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="10" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="30" cy="30" r="1.5" fill="white" opacity="0.7"/>

  <defs>
    <!-- Modern purple-blue gradient for AI/tech feel -->
    <linearGradient id="bgGradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
</svg>
