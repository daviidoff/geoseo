# HyperNiche AI - Supabase Configuration
# This file configures the local Supabase development environment

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

# Custom email templates via Edge Functions
[auth.email.template.confirmation]
subject = "Confirm your HyperNiche AI account"
content_path = ""

[auth.email.template.recovery]
subject = "Reset your HyperNiche AI password"
content_path = ""

[auth.email.template.magic_link]
subject = "Sign in to HyperNiche AI"
content_path = ""

# Auth hooks for custom emails via Resend Edge Function
# Configure in Supabase Dashboard: Authentication > Hooks > Send Email
# URI: https://qogsvugxdosqshixqugf.supabase.co/functions/v1/send-auth-email
# See supabase/EMAILS.md for setup instructions

[auth.sms]
enable_signup = false
enable_confirmations = false

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:54321/auth/v1/callback"

[auth.external.github]
enabled = false

[analytics]
enabled = false
port = 54327
vector_port = 54328

[experimental]
orioledb_version = ""
s3_host = ""
s3_region = "us-east-1"
s3_access_key = ""
s3_secret_key = ""
